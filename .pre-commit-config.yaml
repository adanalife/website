# Vendored / generated assets aren't ours to reformat.
exclude: '^(node_modules/|build/|\.cache/)'

# Install both the pre-commit (file-content) hooks and the commit-msg hook
# (the Conventional Commits check at the bottom) on a plain `pre-commit install`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
        # CloudFormation templates use intrinsic tags (!Ref, !GetAtt, …) that
        # the plain YAML parser can't construct. They're valid CFN, not ours
        # to reformat into tag-free YAML.
        exclude: '^cloudformation/'
      - id: check-json
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # Secrets: broad scan layered on top of the narrow detect-aws-credentials
  # / detect-private-key checks above. Sub-second.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # GitHub Actions workflow linting — fast, and catches the kind of
  # workflow breakage super-linter's actionlint pass would.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Conventional Commits — enforce `type(scope): summary` on commit messages so
  # history stays machine-parseable: it underpins release automation and gives
  # every contributor/agent the same commit grammar without re-explaining it.
  # Runs at the commit-msg stage; default_install_hook_types (top of file) wires
  # it up on `pre-commit install`. Guards LOCAL commits — and since PRs
  # squash-merge, the PR *title* becomes the squash subject, so keep PR titles
  # conventional too.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
