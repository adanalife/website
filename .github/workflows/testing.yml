name: Testing
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  ENV: test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .tool-versions
        bundler-cache: true
    - name: Build the static site
      run: bundle exec middleman build --bail
    # Verify the per-PR build (no STAGING env) renders the production
    # Twitch channel, not the staging one. PR previews aren't staging,
    # so they should match production output for the iframe channel.
    - name: Verify Twitch iframe channel (default)
      run: |
        if grep -rln 'channel=adanalife_staging' build/ ; then
          echo "::error::Per-PR build leaked channel=adanalife_staging — STAGING env should be unset on PRs"
          exit 1
        fi
        expected_count=2
        actual=$(grep -rl 'channel=adanalife_' build/ | wc -l | tr -d ' ')
        if [ "$actual" -lt "$expected_count" ]; then
          echo "::error::Expected at least $expected_count posts to render channel=adanalife_; found $actual"
          exit 1
        fi
        echo "Default Twitch iframe channel verified ($actual posts)"
    # Skip CF Pages deploy for Dependabot PRs: GitHub deliberately
    # withholds repo secrets from Dependabot-triggered runs, so
    # CLOUDFLARE_API_TOKEN comes through blank and wrangler fails.
    # Dep bumps don't need a preview deploy anyway.
    - name: Deploy to Cloudflare Pages (staging)
      id: deploy
      if: github.actor != 'dependabot[bot]'
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      shell: bash
      run: |
        set -o pipefail
        npx wrangler pages deploy build/ --project-name dana-lol-staging --branch ${{ github.head_ref }} | tee wrangler.out
        alias=$(grep "Deployment alias URL:" wrangler.out | grep -oE 'https://[^ ]+' | tail -1)
        echo "alias=$alias" >> "$GITHUB_OUTPUT"
    - name: Sticky preview URL comment
      if: github.actor != 'dependabot[bot]'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: cf-preview
        message: |
          🔭 **Preview:** ${{ steps.deploy.outputs.alias }}
