name: Testing
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  ENV: test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .tool-versions
        bundler-cache: true
    - name: Build the static site
      run: bundle exec middleman build --bail
    # Skip CF Pages deploy for Dependabot PRs: GitHub deliberately
    # withholds repo secrets from Dependabot-triggered runs, so
    # CLOUDFLARE_API_TOKEN comes through blank and wrangler fails.
    # Dep bumps don't need a preview deploy anyway.
    - name: Deploy to Cloudflare Pages (staging)
      id: deploy
      if: github.actor != 'dependabot[bot]'
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Pass head_ref through the environment rather than interpolating it
        # directly into the script, so a crafted branch name can't inject shell.
        HEAD_REF: ${{ github.head_ref }}
      shell: bash
      run: |
        set -o pipefail
        npx wrangler pages deploy build/ --project-name dana-lol-staging --branch "$HEAD_REF" | tee wrangler.out
        alias=$(grep "Deployment alias URL:" wrangler.out | grep -oE 'https://[^ ]+' | tail -1)
        echo "alias=$alias" >> "$GITHUB_OUTPUT"
    - name: Sticky preview URL comment
      if: github.actor != 'dependabot[bot]'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: cf-preview
        message: |
          🔭 **Preview:** ${{ steps.deploy.outputs.alias }}
