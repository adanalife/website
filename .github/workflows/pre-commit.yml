name: pre-commit

on:
  pull_request:
  push:
    branches: [develop, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      # gitleaks + actionlint build from source (language: golang);
      # ubuntu-latest ships the Go toolchain preinstalled.
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch
