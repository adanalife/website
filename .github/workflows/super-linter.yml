---
name: super-linter

# Per-PR lint coverage comes from pre-commit (pre-commit.yml) and the
# misspell reviewdog check (linting.yml); super-linter runs as a weekly
# whole-codebase sweep instead of on every PR/push.
on:
  schedule:
    - cron: '19 9 * * 1' # Mondays 09:19 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Run Linters
    runs-on: ubuntu-latest
    # 30 rather than the usual 15 for lint jobs: the weekly sweep lints the
    # whole codebase, not a PR diff.
    timeout-minutes: 30

    steps:
      # fetch-depth: 0 is required by super-linter v6+: it diffs against
      # the default branch (main) to figure out which files changed,
      # which means main has to be present in the local checkout.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: run-linters
        uses: super-linter/super-linter@v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # weekly sweep: lint everything, not just files changed vs main
          VALIDATE_ALL_CODEBASE: true
          # don't post a "Super-linter summary" comment on every PR run
          # (the Actions step summary tab still gets the same content)
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          # disabled until we go through and fix the issues
          VALIDATE_JSCPD: false
          VALIDATE_ENV: false
          # disabled — many SCSS modernization issues across source/assets/
          # (color-function-notation, alpha-value-notation, vendor prefixes,
          # length-zero-no-unit). Fix is non-trivial; revisit later.
          VALIDATE_CSS: false
          VALIDATE_CSS_PRETTIER: false
          # disabled — needs a .rubocop.yml + bulk auto-fixes for
          # frozen_string_literal comments and single→double quotes.
          # Worth a dedicated PR.
          VALIDATE_RUBY: false
          # disabled — false-positive: cfn-lint emits a Pydantic/Python 3.14
          # compat warning to stderr, which super-linter treats as a failure.
          # The only CFN in the repo is the legacy S3/CloudFront rollback
          # setup under cloudformation/.
          VALIDATE_CLOUDFORMATION: false
          # disabled until we can resolve their issues
          VALIDATE_BIOME_FORMAT: false
          # disabled — Biome 2.5 (pulled in by super-linter @v8) parses .svg
          # and .erb files as HTML/JSX and false-positives on SVG comments
          # (`<!-- Adobe Illustrator … -->`) and ERB tags (`<% … %>`). This is
          # a Ruby/Middleman site with no first-party JS/TS for Biome to lint.
          VALIDATE_BIOME_LINT: false
          VALIDATE_CHECKOV: false
          VALIDATE_GITHUB_ACTIONS: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_SHELL_SHFMT: false
          VALIDATE_SPELL_CODESPELL: false
          VALIDATE_TRIVY: false
          VALIDATE_YAML_PRETTIER: false
