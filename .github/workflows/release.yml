name: release
on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .tool-versions
        bundler-cache: true
    - name: Install ImageMagick
      run: sudo apt-get install -y imagemagick
    - name: Install pngout
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget --user-agent="Mozilla/5.0" https://www.jonof.id.au/files/kenutils/pngout-20200115-linux.tar.gz
        tar -xvf pngout-20200115-linux.tar.gz
        sudo mv pngout-20200115-linux/amd64/pngout /usr/local/bin/
        rm -rf pngout-20200115-linux*
    - name: Cache Middleman and image processing files
      uses: actions/cache@v5
      with:
        path: |
          .middleman/cache
          build
        key: middleman-${{ hashFiles('**/*') }}
        restore-keys: |
          middleman-
    - name: Build the static site
      run: bundle exec middleman build --bail
    - name: Deploy to Cloudflare Pages (production)
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Tag pushes have detached HEAD; pin to master so the deploy
      # lands on the production alias serving www.dana.lol.
      run: npx wrangler pages deploy build/ --project-name dana-lol-production --branch master

    - name: Post Discord notification
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        VERSION_TAG: ${{ github.ref_name }}
      uses: Ilshidur/action-discord@0.4.0
      with:
        args: 'New release for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
