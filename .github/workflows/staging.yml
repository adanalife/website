name: Staging
on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .tool-versions
        bundler-cache: true
    - name: Build the static site
      env:
        STAGING: 'true'
      run: bundle exec middleman build --bail
    # Verify the staging build actually renders the staging Twitch channel
    # in both posts that embed the player. Catches a future regression in
    # config.rb's twitch_channel helper or a missing STAGING env-var.
    - name: Verify Twitch iframe channel (staging)
      run: |
        expected_count=2
        actual=$(grep -rl 'channel=adanalife_staging' build/ | wc -l | tr -d ' ')
        if [ "$actual" -ne "$expected_count" ]; then
          echo "::error::Expected $expected_count posts to render channel=adanalife_staging; found $actual"
          grep -rln 'channel=adanalife' build/ || true
          exit 1
        fi
        if grep -rln 'channel=adanalife_"' build/ ; then
          echo "::error::Found channel=adanalife_ in staging build — STAGING env-var not propagating to twitch_channel helper"
          exit 1
        fi
        echo "Staging Twitch iframe channel verified ($actual posts)"
    - name: Deploy to Cloudflare Pages (staging)
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # The staging CF Pages project's production_branch is "master", and
      # its master alias is what serves www.whalecore.com. Pinning to
      # --branch master here means develop merges land on whalecore.com.
      run: npx wrangler pages deploy build/ --project-name dana-lol-staging --branch master
