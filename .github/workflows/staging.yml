name: Staging
on:
  push:
    branches: [develop]

# Only deploy the newest develop merge. Two pushes close together would race,
# and the older deploy finishing last would leave staging on stale content.
# Cancel an in-flight deploy when a newer develop push arrives so staging tracks
# HEAD. (Tag-triggered release.yml is NOT guarded — every release must ship.)
concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version-file: .tool-versions
        bundler-cache: true
    - name: Build the static site
      run: bundle exec middleman build --bail
    - name: Deploy to Cloudflare Pages (staging)
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # The staging CF Pages project's production_branch is "master", and
      # its master alias is what serves www.whalecore.com. Pinning to
      # --branch master here means develop merges land on whalecore.com.
      run: npx wrangler pages deploy build/ --project-name dana-lol-staging --branch master
